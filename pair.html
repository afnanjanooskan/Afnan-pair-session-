<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAIR CODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #141414;
      font-family: 'Arial', sans-serif;
      color: #fff;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 320px;
      padding: 24px 20px 20px;
      text-align: center;
      background-color: #a20000;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 18px;
      border: 1px solid #ffffff33;
    }

    .tab-btn {
      flex: 1;
      padding: 9px 0;
      background: transparent;
      border: none;
      color: #ffffffaa;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn.active {
      background: #25d366;
      color: #fff;
    }

    .tab-btn:hover:not(.active) {
      background: #ffffff18;
      color: #fff;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Phone input ── */
    .input-container {
      display: flex;
      background: #ffffff;
      border-radius: 1rem;
      padding: 0.3rem;
      gap: 0.3rem;
      width: 100%;
      box-sizing: border-box;
    }

    .input-container input {
      border-radius: 0.8rem 0 0 0.8rem;
      background: #000;
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-left: 2px solid #075e54;
      color: #ecf0f1;
      font-size: 14px;
      transition: all 0.2s ease-in-out;
      min-width: 0;
    }

    .input-container input:focus {
      border-left: 2px solid #075e54;
      outline: none;
      box-shadow: inset 8px 8px 8px #075e54, inset -8px -8px 8px #2c3e50;
    }

    .input-container button {
      padding: 0.8rem 1rem;
      background: #25d366;
      font-weight: 900;
      letter-spacing: 0.2rem;
      text-transform: uppercase;
      color: white;
      border: none;
      border-radius: 0 1rem 1rem 0;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-container button:hover { background: #2980b9; }

    /* ── QR section ── */
    #qr-start-btn {
      display: inline-block;
      margin: 10px 0 8px;
      padding: 10px 28px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 0.8rem;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #qr-start-btn:hover { background: #2980b9; }

    #qr-image-wrap {
      display: none;
      margin: 10px auto 6px;
    }
    #qr-image-wrap img {
      width: 200px;
      height: 200px;
      border-radius: 8px;
      border: 3px solid #25d366;
    }

    #qr-hint {
      font-size: 12px;
      color: #ffffffbb;
      margin-top: 4px;
    }

    /* ── Shared ── */
    #waiting-message, #qr-waiting {
      color: #ffffffbb;
      margin-top: 10px;
      font-size: 13px;
    }

    #loading-spinner, #qr-spinner {
      display: none;
      color: white;
      margin-top: 10px;
    }

    .fa-spinner { animation: spin 2s linear infinite; }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h3 { margin: 0 0 6px; font-size: 16px; }
    h6 { margin: 0 0 12px; font-size: 12px; font-weight: normal; color: #ffffffcc; }

    #pair, #qr-result {
      margin-top: 10px;
      min-height: 20px;
    }

    @media (max-width: 400px) {
      .box { width: 90vw; }
      .input-container { flex-direction: column; }
      .input-container input { border-radius: 0.8rem; }
      .input-container button { border-radius: 0.8rem; padding: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box" id="box">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" id="tab-phone" onclick="switchTab('phone')">
          <i class="fas fa-phone"></i> Phone Code
        </button>
        <button class="tab-btn" id="tab-qr" onclick="switchTab('qr')">
          <i class="fas fa-qrcode"></i> QR Code
        </button>
      </div>

      <!-- ── Phone number pairing panel ── -->
      <div class="tab-panel active" id="panel-phone">
        <h3>Link Robin with phone number</h3>
        <h6>🔢 Enter your number with country code</h6>
        <div class="input-container">
          <input placeholder="+94704xxxxxx" type="number" id="number">
          <button id="submit">Submit</button>
        </div>
        <div id="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Generating…</div>
        <main id="pair"></main>
      </div>

      <!-- ── QR code pairing panel ── -->
      <div class="tab-panel" id="panel-qr">
        <h3>Link Robin via QR Code</h3>
        <h6>📱 Open WhatsApp → Linked Devices → Link a Device</h6>
        <button id="qr-start-btn" onclick="getQR()">
          <i class="fas fa-qrcode"></i> Generate QR
        </button>
        <div id="qr-spinner"><i class="fas fa-spinner fa-spin"></i> Loading QR…</div>
        <div id="qr-image-wrap">
          <img id="qr-img" src="" alt="QR Code">
          <p id="qr-hint">Scan this QR with WhatsApp. It expires in ~60 s.</p>
        </div>
        <div id="qr-result"></div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    // ── Phone number pairing ─────────────────────────────────────────────────
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let obj = document.getElementById("copy");
      let text = obj.innerText;
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "✔️ COPIED";
      obj.style = "color:blue;font-weight:bold";
      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:white;font-weight:bold";
      }, 500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<span style="color:#ffdddd">❗ Enter your WhatsApp number with country code.</span>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<span style="color:#ffdddd">❗ Invalid number. Please try again.</span>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        let bb = "", bbc = "";
        bc.split('').forEach(ch => {
          bbc += ch;
          bb += (bbc.length === 3 || bbc.length === 8) ? ` ${ch}` : ch;
        });
        c.type = "text";
        c.value = "+" + bb;
        c.style = "color:white;font-size:18px";
        document.getElementById("loading-spinner").style.display = "block";
        a.innerHTML = "";
        let { data } = await axios(`/code?number=${bc}`);
        let code = data.code || "❗ Service Unavailable";
        a.innerHTML = `<font id="copy" onclick="Copy()" style="color:blue;font-weight:bold;cursor:pointer" size="5">CODE: <span style="color:#fff">${code}</span></font><br><br>`;
        document.getElementById("loading-spinner").style.display = "none";
      }
    });

    // ── QR code pairing ───────────────────────────────────────────────────────
    async function getQR() {
      const startBtn  = document.getElementById("qr-start-btn");
      const spinner   = document.getElementById("qr-spinner");
      const imgWrap   = document.getElementById("qr-image-wrap");
      const qrImg     = document.getElementById("qr-img");
      const qrResult  = document.getElementById("qr-result");

      startBtn.style.display = "none";
      spinner.style.display  = "block";
      imgWrap.style.display  = "none";
      qrResult.innerHTML     = "";

      try {
        const { data } = await axios("/code/qr");

        spinner.style.display = "none";

        if (data.qr) {
          qrImg.src = data.qr;
          imgWrap.style.display = "block";

          // After 60 s, allow user to refresh
          setTimeout(() => {
            imgWrap.style.display = "none";
            qrResult.innerHTML = `<span style="color:#ffdddd">⏱️ QR expired.</span>`;
            startBtn.textContent = "🔄 New QR Code";
            startBtn.style.display = "inline-block";
          }, 60000);

        } else {
          qrResult.innerHTML = `<span style="color:#ffdddd">❗ ${data.error || "Could not generate QR"}</span>`;
          startBtn.style.display = "inline-block";
        }
      } catch (err) {
        spinner.style.display  = "none";
        qrResult.innerHTML = `<span style="color:#ffdddd">❗ Service Unavailable</span>`;
        startBtn.style.display = "inline-block";
      }
    }
  </script>
</body>
</html>
